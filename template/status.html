<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 服务器状态</title>
    <style>
        @font-face {
          font-family: 'Jiying';
          src: url("{{ font }}") format('truetype');
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Jiying', sans-serif;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            padding: 36px;
            color: #333;
            margin: 0;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            {{ background_image_style | safe }}
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            color: white;
            font-size: 43px;
            font-weight: bold;
            margin-bottom: 36px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .status-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .server-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 28px 36px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            min-width: 280px;
            flex: 1;
            max-width: 350px;
            transition: all 0.3s ease;
        }

        .server-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .server-name {
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 16px;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        .status-dot.online {
            background-color: #4ade80;
            color: #4ade80;
            animation: pulse-green 2s infinite;
        }

        .status-dot.offline {
            background-color: #f87171;
            color: #f87171;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 10px #4ade80; }
            50% { box-shadow: 0 0 20px #4ade80, 0 0 30px #4ade80; }
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 10px #f87171; }
            50% { box-shadow: 0 0 20px #f87171, 0 0 30px #f87171; }
        }

        .status-text {
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .status-text.online {
            color: #4ade80;
        }

        .status-text.offline {
            color: #f87171;
        }

        .no-servers {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 25px;
            font-style: italic;
            padding: 40px;
        }

        /* 隐藏滚动条样式 */
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
        }

        scrollbar-width: none;
        -ms-overflow-style: none;
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Minecraft 服务器状态</div>
        <div class="status-grid">
            {% if servers_status %}
                {% for server_name, is_online in servers_status.items() %}
                    <div class="server-card">
                        <div class="server-name">{{ server_name }}</div>
                        <div class="status-indicator">
                            <div class="status-dot {{ 'online' if is_online else 'offline' }}"></div>
                            <div class="status-text {{ 'online' if is_online else 'offline' }}">
                                {{ '在线' if is_online else '离线' }}
                            </div>
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <div class="no-servers">暂无服务器状态信息</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
